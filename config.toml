enable-magisk-update = true # set this to false if you do not want to receive updates for the module in magisk app
parallel-jobs = 1

[YouTube]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
arch = "arm64-v8a"
build-mode = "module"
excluded-patches = "'Disable double tap actions' 'Swipe controls' 'Disable auto captions' 'Custom branding' 'Change form factor' 'Hide timestamp' 'Exit fullscreen mode' 'Custom player overlay opacity' 'Wide search bar' 'Shorts autoplay' 'Spoof app version' 'Change start page' 'Disable resuming Shorts on startup' 'Alternative thumbnails' 'Bypass image region restrictions' 'Announcements' 'Enable debugging' 'Spoof device dimensions' 'Check watch history domain name resolution' 'GmsCore support' 'Loop video' 'Spoof video streams' 'Disable video codecs'"

[Music]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
patches-source = "anddea/revanced-patches"
integrations-source = "anddea/revanced-integrations"
arch = "arm64-v8a"
build-mode = "module"
included-patches = "'Hide action bar components' 'Hide ads' 'Flyout menu components' 'Disable forced auto audio tracks' 'Remove viewer discretion dialog' 'Disable Cairo splash animation' 'Custom header for YouTube Music' 'Disable music video in album' 'Remove background playback restrictions' 'Bitrate default value' 'Sanitize sharing links' 'Navigation bar components' 'Certificate spoof' 'Return YouTube Dislike' 'Settings for YouTube Music' 'SponsorBlock' 'Video playback'"
exclusive-patches = true
